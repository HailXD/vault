<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vault</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="wrap">
      <section class="card">
        <div class="title">Vault</div>

        <div class="grid">
          <div>
            <label for="key">Key</label>
            <div class="row">
              <div class="input-wrap">
                <input
                  id="key"
                  type="password"
                  placeholder="Enter key..."
                  autocomplete="new-password"
                />
                <button class="input-toggle" id="toggleKey" title="Show/Hide key">
                  Show
                </button>
              </div>
            </div>
          </div>

          <div>
            <label for="secretInput">Upload Secret</label>
            <div class="row">
              <input
                id="secretInput"
                type="file"
                accept=".safetensors,application/octet-stream"
              />
              <span class="pill" id="secretBadge">No secret loaded</span>
            </div>
          </div>
        </div>

        <div style="margin-top: 12px">
          <label for="text">Text</label>
          <textarea id="text" placeholder="Type secret text here..."></textarea>
        </div>

        <div class="files-add">
          <div class="row" style="justify-content: space-between; align-items: flex-end">
            <div>
              <label for="fileInput">Add file(s)</label>
              <input id="fileInput" type="file" multiple />
            </div>
            <button class="btn danger" id="clearFiles">
              Delete all selected
            </button>
          </div>
        </div>

        <details id="filesDetails">
          <summary>
            <div class="summary-left">
              <div class="summary-title">Files</div>
              <div class="summary-meta" id="filesSummary">0 files — 0 B</div>
            </div>
            <div class="pill" id="filesPill">Collapsed</div>
          </summary>
          <div class="details-body">
            <div class="small">Selected for encryption</div>
            <div class="list" id="selectedList"></div>
          </div>
        </details>

        <div class="footer">
          <button class="btn" id="download7z">Download as 7z</button>
          <button class="btn primary" id="encrypt">
            Download as Safetensors
          </button>
          <button class="btn primary" id="decrypt">Decrypt</button>
        </div>

      </section>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
